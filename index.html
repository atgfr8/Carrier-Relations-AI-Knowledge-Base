<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carrier Ruleset & Vetting Guide</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --atg-teal: #0069A6;
  --atg-teal-dark: #004F7C;
  --atg-teal-light: #E6F2F9;
  --atg-navy: #1A2E44;
  --bg: #D9E4ED;
  --surface: #FFFFFF;
  --border: #C8D8E4;
  --text: #1A2E44;
  --text-2: #4A6478;
  --radius: 6px;
}

body {
  font-family: 'IBM Plex Sans', sans-serif;
  margin: 0;
  background: var(--bg);
}

/* HEADER */
.header {
  background: var(--atg-navy);
  border-bottom: 3px solid var(--atg-teal);
  padding: 14px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.header-brand {
  display: flex;
  align-items: center;
  gap: 14px;
}

/* NAV */
.header-nav {
  display: flex;
  gap: 6px;
  align-items: center;
}

/* BUTTON STYLE (used for everything now) */
.header-nav button,
.header-nav a {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  padding: 6px 12px;
  border-radius: var(--radius);
  border: 1px solid #ccc;
  background: #fff;
  color: #1A2E44;
  cursor: pointer;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
}

/* HOVER */
.header-nav button:hover,
.header-nav a:hover {
  background: var(--atg-teal);
  color: #fff;
  border-color: var(--atg-teal);
}

/* ACTIVE PAGE */
.header-nav a.active {
  background: var(--atg-teal);
  color: #fff;
  border-color: var(--atg-teal);
}

</style>
</head>

<body>

<div class="header">

  <div class="header-brand">
    <div>
      <div style="font-size:18px;font-weight:700;letter-spacing:2px;color:#fff;text-transform:uppercase;">
        Armstrong
      </div>
      <div style="font-size:8px;letter-spacing:4px;color:rgba(255,255,255,0.6);text-transform:uppercase;">
        Transport Group
      </div>
    </div>

    <div style="width:1px;height:30px;background:rgba(255,255,255,0.2);"></div>

    <div style="font-size:15px;font-weight:600;color:#fff;">
      Carrier Ruleset & Vetting Guide
    </div>
  </div>

  <nav class="header-nav">

    <!-- EXISTING TOOL BUTTONS -->
    <button onclick="switchMode('checker')">Vetting checker</button>
    <button onclick="switchMode('alerts')">Identity alert guide</button>

    <!-- NEW NAV -->
    <a href="index.html" class="active">Main</a>
    <a href="hvhr.html">HVHR</a>

  </nav>

</div>

<script>
function switchMode(mode) {
  console.log("Switching to:", mode);
  // Your existing logic stays intact
}
</script>

</body>
</html>
